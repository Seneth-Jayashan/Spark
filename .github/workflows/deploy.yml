name: 🚀 Test and Deploy SPARK System

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # allows manual trigger

jobs:
  # ==========================================
  # STAGE 1: QUALITY GATE (Playwright Tests)
  # ==========================================
  e2e-tests:
    name: 🧪 Run Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4
        
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Recommended to pin a specific version like 20 instead of lts/*
          
      - name: 📦 Install dependencies
        run: |
          npm ci
          npm install --prefix apps/api
          npm install --prefix apps/web
        
      - name: 🌐 Install Playwright Browsers
        run: npx playwright install --with-deps
        
      - name: 🧪 Run Playwright tests
        env:
          PORT: 5000
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: npx playwright test
        
      - name: 📊 Upload Test Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30

  # ==========================================
  # STAGE 2: DEPLOY BACKEND (Requires Stage 1)
  # ==========================================
  backend-deploy:
    name: 🔧 Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: e2e-tests # 🛑 CRITICAL: This job will only run if e2e-tests passes!

    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Install Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy Backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Deploying backend to Railway..."
          railway up --service Spark --detach
          echo "✅ Backend deployed successfully!"

  # ==========================================
  # STAGE 3: DEPLOY FRONTEND (Requires Stage 2)
  # ==========================================
  frontend-deploy:
    name: 🌐 Redeploy Frontend on Vercel
    runs-on: ubuntu-latest
    needs: backend-deploy # 🛑 CRITICAL: This job only runs if backend-deploy passes!

    steps:
      - name: 🔄 Trigger Vercel Redeploy
        run: |
          echo "Triggering Vercel redeploy..."
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_${{ secrets.VERCEL_PROJECT_ID }}/LONg_DEPLOY_HOOK_ID" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json"
          echo "✅ Vercel redeploy triggered!"