name: 🚀 Test and Deploy SPARK System

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # allows manual trigger

jobs:
  e2e-tests:
    name: 🧪 Run Playwright Tests
    timeout-minutes: 60
    runs-on: ubuntu-latest
    
    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4
        
      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          
      - name: 📦 Install dependencies
        run: |
          npm ci
          npm install --prefix apps/api
          npm install --prefix apps/web
          
      - name: ⚙️ Get Playwright version
        id: playwright-version
        run: echo "PLAYWRIGHT_VERSION=$(npx playwright --version | awk '{print $2}')" >> $GITHUB_ENV

      - name: 🗄️ Cache Playwright Browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: 🌐 Install Playwright Browsers (if not cached)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps
        
      - name: 🌐 Install OS Dependencies (if cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps
        
      - name: 🧪 Run Playwright tests
        env:
          PORT: 5000
          MONGO_URI: ${{ secrets.MONGO_URI }}
        run: npx playwright test
        
      - name: 📊 Upload Test Report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30


  backend-deploy:
    name: 🔧 Deploy Backend to Railway
    runs-on: ubuntu-latest
    needs: e2e-tests 

    steps:
      - name: 🛎️ Checkout repository
        uses: actions/checkout@v4

      - name: 📦 Install Railway CLI
        run: npm install -g @railway/cli

      - name: 🚀 Deploy Backend to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: |
          echo "Deploying backend to Railway..."
          railway up --service Spark --detach
          echo "✅ Backend deployed successfully!"

  frontend-deploy:
    name: 🌐 Redeploy Frontend on Vercel
    runs-on: ubuntu-latest
    needs: backend-deploy 

    steps:
      - name: 🔄 Trigger Vercel Redeploy
        run: |
          echo "Triggering Vercel redeploy..."
          curl -X POST "https://api.vercel.com/v1/integrations/deploy/prj_${{ secrets.VERCEL_PROJECT_ID }}/LONg_DEPLOY_HOOK_ID" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" \
            -H "Content-Type: application/json"
          echo "✅ Vercel redeploy triggered!"